<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forge360 Workforce OS</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div class="brand">
          <span>F360</span>
          <div>
            <h1>Forge360</h1>
            <p>Building Better Workplaces</p>
          </div>
        </div>
        <nav>
          <a class="active" href="#dashboard" data-view="dashboard">Dashboard</a>
          <a href="#people" data-view="people">People</a>
          <a href="#recruitment" data-view="recruitment">Recruitment</a>
          <a href="#leave" data-view="leave">Leave</a>
          <a href="#payroll" data-view="payroll">Payroll</a>
          <a href="#compliance" data-view="compliance">Compliance</a>
          <a href="#workflows" data-view="workflows">Workflows</a>
          <a href="#forms" data-view="forms">Forms</a>
          <a href="#analytics" data-view="analytics">Analytics</a>
          <a href="#ai" data-view="ai">AI Copilot</a>
        </nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div id="page-heading"></div>
          <div class="actions">
            <button class="secondary" type="button" data-action="seed-employee">Add Employee</button>
            <button type="button" data-action="seed-leave">Create Leave Request</button>
          </div>
        </header>
        <section id="view"></section>
      </section>
    </main>
    <script src="/main.js"></script>
  </body>
</html>
