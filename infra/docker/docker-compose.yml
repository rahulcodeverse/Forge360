version: '3.9'

services:
  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hrms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms_secret
      POSTGRES_DB: hrms
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hrms']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch 8 ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: hrms_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    profiles: ['full']

  # ── MinIO (S3-compatible local storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hrms_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MailHog (local email capture) ───────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: hrms_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  # ── NestJS API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: hrms_api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file:
      - ../../.env
    ports:
      - '3001:3001'
    profiles: ['app']

  # ── Next.js web ───────────────────────────────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: hrms_web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - ../../.env
    ports:
      - '3000:3000'
    profiles: ['app']

  # ── PDF service ───────────────────────────────────────────────────────────────
  pdf-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.pdf-service
    container_name: hrms_pdf
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    env_file:
      - ../../.env
    ports:
      - '3002:3002'
    profiles: ['app']

  # ── BullMQ worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: hrms_worker
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file:
      - ../../.env
    profiles: ['app']

volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:
