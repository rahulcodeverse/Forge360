services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: forge360
      POSTGRES_USER: forge360
      POSTGRES_PASSWORD: forge360
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

volumes:
  postgres-data:

